<!doctype html><html lang="en"><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>AI Broker</title>
<style>
:root{font-family:Inter,ui-sans-serif,system-ui;color:#1b1333;background:#f5f3f8}*{box-sizing:border-box}body{margin:0;background:radial-gradient(circle at 15% 0,#eadcff 0,transparent 32rem),#f5f3f8}button,input{font:inherit}.shell{max-width:1100px;margin:auto;padding:32px 20px 64px}.top{display:flex;align-items:center;justify-content:space-between;margin-bottom:28px}.brand{font-size:22px;font-weight:900;letter-spacing:-.04em}.brand span{background:linear-gradient(90deg,#7c3aed,#ec4899,#f59e0b);color:transparent;background-clip:text}.status{display:flex;gap:8px;align-items:center;font-size:13px;font-weight:700}.dot{width:9px;height:9px;border-radius:50%;background:#18b981;box-shadow:0 0 0 5px #18b98122}.hero{color:white;padding:32px;border-radius:30px;background:linear-gradient(135deg,#29145f,#6d28d9 55%,#ec4899);box-shadow:0 24px 60px #512da830}.eyebrow{font-size:12px;text-transform:uppercase;letter-spacing:.12em;opacity:.7;font-weight:800}.balance{font-size:clamp(40px,8vw,72px);line-height:1;margin:14px 0 8px;letter-spacing:-.06em}.sub{opacity:.75}.grid{display:grid;grid-template-columns:1.25fr .75fr;gap:18px;margin-top:18px}.card{background:#fff;border-radius:24px;padding:24px;box-shadow:0 8px 30px #22143b0a}.card h2{margin:0 0 18px;font-size:18px}.quote{display:flex;gap:10px}.quote input{width:100%}.field{border:1px solid #e6e0ec;background:#faf9fb;padding:14px;border-radius:14px;outline:none}.field:focus{border-color:#7c3aed;box-shadow:0 0 0 3px #7c3aed18}.primary{border:0;border-radius:14px;background:#7c3aed;color:#fff;padding:14px 20px;font-weight:800;cursor:pointer}.price{font-size:40px;font-weight:900;letter-spacing:-.05em;margin:24px 0 4px}.muted{color:#81768e;font-size:13px}.ticket{display:grid;gap:12px}.segmented{display:grid;grid-template-columns:1fr 1fr;background:#f1edf5;border-radius:14px;padding:4px}.segmented input{display:none}.segmented label{text-align:center;padding:10px;border-radius:11px;font-weight:800;cursor:pointer}.segmented input:checked+label{background:#fff;color:#6d28d9;box-shadow:0 3px 12px #25123912}.positions{grid-column:1/-1}.row{display:grid;grid-template-columns:1fr repeat(3,110px);gap:12px;padding:14px 4px;border-top:1px solid #eee9f2;align-items:center}.ticker{font-weight:900}.positive{color:#059669}.empty{padding:30px;text-align:center;color:#81768e;background:#faf9fb;border-radius:18px}.toast{position:fixed;right:24px;bottom:24px;max-width:360px;padding:15px 18px;border-radius:14px;background:#211734;color:white;box-shadow:0 12px 40px #0003;display:none}@media(max-width:760px){.grid{grid-template-columns:1fr}.hero{padding:26px}.row{grid-template-columns:1fr 1fr}.positions{grid-column:auto}}
</style><main class="shell"><header class="top"><div class="brand">AI <span>BROKER</span></div><div class="status"><i class="dot"></i> Alpaca paper</div></header><section class="hero"><div class="eyebrow">Total portfolio value</div><div class="balance" id="equity">—</div><div class="sub" id="buying-power">Connecting to your paper account…</div></section><div class="grid"><section class="card"><h2>Explore the market</h2><form class="quote" id="quote-form"><input class="field" id="quote-symbol" value="AAPL" aria-label="Stock symbol"><button class="primary">Get price</button></form><div class="price" id="price">—</div><div class="muted" id="price-label">Latest available market price</div></section><section class="card"><h2>Trade in a tap</h2><form class="ticket" id="order-form"><div class="segmented"><input id="buy" name="side" value="buy" type="radio" checked><label for="buy">Buy</label><input id="sell" name="side" value="sell" type="radio"><label for="sell">Sell</label></div><input class="field" id="order-symbol" value="AAPL" aria-label="Stock symbol"><input class="field" id="qty" type="number" min="0.000001" step="any" value="1" aria-label="Quantity"><button class="primary">Review paper order</button></form></section><section class="card positions"><h2>Your positions</h2><div id="positions"><div class="empty">No positions yet</div></div></section></div></main><div class="toast" id="toast"></div>
<script>
const money=new Intl.NumberFormat('en-US',{style:'currency',currency:'USD'}),toast=document.querySelector('#toast');const notify=message=>{toast.textContent=message;toast.style.display='block';setTimeout(()=>toast.style.display='none',4000)};async function api(path,options){const response=await fetch(path,options),body=await response.json();if(!response.ok)throw Error(body.error);return body}async function load(){try{const {account,positions}=await api('/api/account');document.querySelector('#equity').textContent=money.format(account.equity);document.querySelector('#buying-power').textContent=`${money.format(account.buyingPower)} available to trade`;document.querySelector('#positions').innerHTML=positions.length?positions.map(p=>`<div class="row"><div><div class="ticker">${p.symbol}</div><div class="muted">${p.qty} shares</div></div><div>${money.format(p.currentPrice)}</div><div>${money.format(p.marketValue)}</div><div class="${Number(p.unrealizedPl)>=0?'positive':''}">${money.format(p.unrealizedPl)}</div></div>`).join(''):'<div class="empty">No positions yet</div>'}catch(e){notify(e.message)}}document.querySelector('#quote-form').onsubmit=async e=>{e.preventDefault();try{const symbol=document.querySelector('#quote-symbol').value,{price}=await api(`/api/quote?symbol=${encodeURIComponent(symbol)}`);document.querySelector('#price').textContent=money.format(price);document.querySelector('#price-label').textContent=`Latest ${symbol.toUpperCase()} price`;document.querySelector('#order-symbol').value=symbol.toUpperCase()}catch(e){notify(e.message)}};document.querySelector('#order-form').onsubmit=async e=>{e.preventDefault();const symbol=document.querySelector('#order-symbol').value.toUpperCase(),qty=document.querySelector('#qty').value,side=new FormData(e.target).get('side');if(!confirm(`${side.toUpperCase()} ${qty} ${symbol} at market in your PAPER account?`))return;try{await api('/api/orders',{method:'POST',headers:{'content-type':'application/json'},body:JSON.stringify({symbol,qty,side})});notify(`Paper order submitted: ${side} ${qty} ${symbol}`);load()}catch(e){notify(e.message)}};load();
</script></html>
